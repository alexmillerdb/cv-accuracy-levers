bundle:
  name: cv-accuracy-levers

variables:
  catalog:
    description: Unity Catalog catalog for demo metadata.
    default: main
  schema:
    description: Unity Catalog schema for demo metadata.
    default: cv_accuracy_levers
  volume:
    description: Unity Catalog volume for image artifacts and intermediate files.
    default: cv_accuracy_levers
  volume_subpath:
    description: Subdirectory inside the Unity Catalog volume.
    default: artifacts
  experiment_name:
    description: MLflow experiment path or name.
    default: /Shared/cv-accuracy-levers
  experiment_id:
    description: Optional MLflow experiment ID. Prefer this when known.
    default: ""
  data_manifest:
    description: Databricks-accessible source manifest path for dataset ingest.
    default: ""
  data_dir:
    description: Databricks-accessible image directory for dataset ingest.
    default: ""
  uc_table:
    description: UC table name for normalized image manifest rows.
    default: image_manifest

resources:
  jobs:
    smoke_sample_cpu:
      name: cv-accuracy-levers-smoke-sample-cpu
      environments:
        - environment_key: smoke_cpu_env
          spec:
            environment_version: "4"
            dependencies:
              - "mlflow[databricks]>=3.1"
              - "numpy>=1.26"
              - "python-dotenv>=1.0"
      tasks:
        - task_key: tiny_sample
          environment_key: smoke_cpu_env
          spark_python_task:
            python_file: scripts/run_tiny_sample.py
            parameters:
              - --runtime
              - databricks_serverless_cpu
              - --log-mlflow
              - --tracking-uri
              - databricks
              - --experiment-id
              - ${var.experiment_id}
              - --experiment-name
              - ${var.experiment_name}
    baseline_sample_cpu:
      name: cv-accuracy-levers-baseline-sample-cpu
      environments:
        - environment_key: baseline_cpu_env
          spec:
            environment_version: "4"
            dependencies:
              - "mlflow[databricks]>=3.1"
              - "numpy>=1.26"
              - "python-dotenv>=1.0"
              - "scikit-learn>=1.4"
      tasks:
        - task_key: baseline_sample
          environment_key: baseline_cpu_env
          spark_python_task:
            python_file: scripts/train_baseline.py
            parameters:
              - --runtime
              - databricks_serverless_cpu
              - --sample-mode
              - "true"
              - --log-mlflow
              - --tracking-uri
              - databricks
              - --experiment-id
              - ${var.experiment_id}
              - --experiment-name
              - ${var.experiment_name}
    threshold_tuning_sample_cpu:
      name: cv-accuracy-levers-threshold-tuning-sample-cpu
      environments:
        - environment_key: threshold_tuning_cpu_env
          spec:
            environment_version: "4"
            dependencies:
              - "mlflow[databricks]>=3.1"
              - "numpy>=1.26"
              - "python-dotenv>=1.0"
              - "scikit-learn>=1.4"
      tasks:
        - task_key: threshold_tuning_sample
          environment_key: threshold_tuning_cpu_env
          spark_python_task:
            python_file: scripts/tune_threshold.py
            parameters:
              - --runtime
              - databricks_serverless_cpu
              - --sample-mode
              - "true"
              - --log-mlflow
              - --tracking-uri
              - databricks
              - --experiment-id
              - ${var.experiment_id}
              - --experiment-name
              - ${var.experiment_name}
    ingest_manifest_uc_cpu:
      name: cv-accuracy-levers-ingest-manifest-uc-cpu
      environments:
        - environment_key: ingest_cpu_env
          spec:
            environment_version: "4"
            dependencies:
              - "numpy>=1.26"
              - "python-dotenv>=1.0"
      tasks:
        - task_key: ingest_manifest_uc
          environment_key: ingest_cpu_env
          spark_python_task:
            python_file: scripts/prepare_dataset.py
            parameters:
              - --source
              - manifest
              - --manifest-path
              - ${var.data_manifest}
              - --data-dir
              - ${var.data_dir}
              - --sample-mode
              - "true"
              - --runtime
              - databricks_serverless_cpu
              - --catalog
              - ${var.catalog}
              - --schema
              - ${var.schema}
              - --volume
              - ${var.volume}
              - --volume-subpath
              - ${var.volume_subpath}
              - --copy-images-to-uc-volume
              - --write-uc
              - --uc-table
              - ${var.uc_table}
              - --create-uc-objects

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: main
      schema: cv_accuracy_levers
      volume: cv_accuracy_levers
      volume_subpath: artifacts
